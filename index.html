    // ============ 工具函式 ============
    const fmt = (n) => new Intl.NumberFormat("zh-TW").format(Math.round(n || 0));
    const fmtPct = (n) => (n * 100).toFixed(2) + "%";

      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    };
    const ymOf = (s) => s.substring(0, 7);
    const yearROC = (ym) => parseInt(ym.substring(0, 4)) - 1911;
    const monthOf = (ym) => parseInt(ym.substring(5, 7));

    function calcMonth(entries, ym) {
      const monthEntries = entries.filter((e) => ymOf(e.date) === ym);
      const income = { pos: 0, uber: 0, total: 0 };
      const expense = {};
      EXPENSE_CATEGORIES.forEach((c) => (expense[c.id] = 0));
      monthEntries.forEach((e) => {
        if (e.type === "income") {
          income[e.category] = (income[e.category] || 0) + e.amount;
          income.total += e.amount;
        } else {
          expense[e.category] = (expense[e.category] || 0) + e.amount;
        }
      });
      const totalExpense = Object.values(expense).reduce((a, b) => a + b, 0);
      const netProfit = income.total - totalExpense;
      return { income, expense, totalExpense, netProfit, ym };
    }

    // ============ Firebase 資料層 ============
    function useShops(uid) {
      const [shops, setShops] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!uid) { setShops([]); setLoading(false); return; }
        const q = fb.query(
          fb.collection(fb.db, "users", uid, "shops"),
          fb.orderBy("createdAt", "asc")
        );
        const unsub = fb.onSnapshot(q, (snap) => {
          setShops(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          setLoading(false);
        }, () => setLoading(false));
        return () => unsub();
      }, [uid]);

      return { shops, loading };
    }

    function useEntries(uid, shopId) {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        if (!uid || !shopId) { setEntries([]); setLoading(false); return; }
        const q = fb.query(
          fb.collection(fb.db, "users", uid, "shops", shopId, "entries"),
          fb.orderBy("date", "desc")
        );
        const unsub = fb.onSnapshot(q, (snap) => {
          setEntries(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          setLoading(false);
        }, () => setLoading(false));
        return () => unsub();
      }, [uid, shopId]);

      return { entries, loading };
    }

    async function createShop(uid, name) {
      return await fb.addDoc(fb.collection(fb.db, "users", uid, "shops"), {
        name, createdAt: fb.serverTimestamp(),
      });
    }
    async function renameShop(uid, shopId, newName) {
      await fb.updateDoc(fb.doc(fb.db, "users", uid, "shops", shopId), { name: newName });
    }
    async function updateMonthlyGoal(uid, shopId, goal) {
      await fb.updateDoc(fb.doc(fb.db, "users", uid, "shops", shopId), { monthlyGoal: goal });
    }
    async function deleteShop(uid, shopId) {
      const entriesSnap = await fb.getDocs(
        fb.collection(fb.db, "users", uid, "shops", shopId, "entries")
      );
      await Promise.all(entriesSnap.docs.map((d) => fb.deleteDoc(d.ref)));
      await fb.deleteDoc(fb.doc(fb.db, "users", uid, "shops", shopId));
    }
    async function addEntry(uid, shopId, entry) {
      return await fb.addDoc(
        fb.collection(fb.db, "users", uid, "shops", shopId, "entries"),
        { ...entry, createdAt: fb.serverTimestamp() }
      );
    }
    async function updateEntryFn(uid, shopId, entryId, updates) {
      await fb.updateDoc(
        fb.doc(fb.db, "users", uid, "shops", shopId, "entries", entryId),
        updates
      );
    }
    async function removeEntry(uid, shopId, entryId) {
      await fb.deleteDoc(fb.doc(fb.db, "users", uid, "shops", shopId, "entries", entryId));

      goalProgress: { padding: "12px 14px", borderRadius: 10, border: "1px solid #d4c4b0", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" },

      statsGrid: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 },

      emptyHint: { padding: "24px", textAlign: "center", color: "#8b7a6a", fontSize: 13, background: "#fefcf8", border: "1px dashed #d4c4b0", borderRadius: 8 },
      historyCard: { background: "#fefcf8", border: "1px solid #e8dfd0", borderRadius: 8, padding: "14px 16px" },
      historyStats: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 12, paddingTop: 12, borderTop: "1px dashed #e8dfd0" },
      histLabel: { fontSize: 10, color: "#8b7a6a", letterSpacing: 1 },
      histValue: { fontSize: 14, fontWeight: 600, marginTop: 2 },
      tabbar: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, display: "flex", background: "rgba(250, 245, 235, 0.95)", backdropFilter: "blur(12px)", borderTop: "1px solid #e8dfd0", paddingBottom: "env(safe-area-inset-bottom)", zIndex: 20 },
      tabBtn: { flex: 1, padding: "10px 0 12px", display: "flex", flexDirection: "column", alignItems: "center", color: "#5a4a3a" },
      tabBtnActive: { color: "#3a2e22" },
      // 彈窗
      modalBack: { position: "fixed", inset: 0, background: "rgba(58, 46, 34, 0.4)", backdropFilter: "blur(4px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20, animation: "fadeIn 0.15s ease" },
      modal: { background: "#faf5eb", border: "1px solid #d4c4b0", borderRadius: 12, padding: 20, width: "100%", maxWidth: 360, boxShadow: "0 8px 24px rgba(0,0,0,0.15)", animation: "slideUp 0.2s ease" },
      modalTitle: { fontSize: 16, fontWeight: 700, fontFamily: "var(--font-display)", marginBottom: 12 },
      modalActions: { display: "flex", gap: 8, marginTop: 16 },
      btnPrimary: { flex: 1, padding: "10px", background: "#3a2e22", color: "#fefcf8", borderRadius: 6, fontSize: 14, fontWeight: 600 },
      btnDanger: { flex: 1, padding: "10px", background: "#8b5a5a", color: "#fefcf8", borderRadius: 6, fontSize: 14, fontWeight: 600 },
      btnSecondary: { flex: 1, padding: "10px", background: "transparent", color: "#5a4a3a", border: "1px solid #d4c4b0", borderRadius: 6, fontSize: 14 },
      // 登入頁
      authPage: { minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, background: "linear-gradient(180deg, #faf5eb 0%, #f5ede0 100%)" },
      authBox: { width: "100%", maxWidth: 360, background: "#fefcf8", border: "1px solid #e8dfd0", borderRadius: 12, padding: 28, boxShadow: "0 4px 16px rgba(0,0,0,0.06)" },
      authTitle: { fontSize: 22, fontWeight: 700, fontFamily: "var(--font-display)", textAlign: "center", marginBottom: 4, letterSpacing: 2 },
      authSubtitle: { fontSize: 12, color: "#8b7a6a", textAlign: "center", marginBottom: 24, letterSpacing: 1 },
      authToggle: { textAlign: "center", marginTop: 16, fontSize: 13, color: "#8b7a6a" },
      authToggleLink: { color: "#8b6f4e", textDecoration: "underline", marginLeft: 4 },
      authError: { padding: "8px 12px", background: "#fbe8e8", border: "1px solid #d4a8a8", borderRadius: 6, fontSize: 12, color: "#8b3a3a", marginBottom: 12 },
      // 店舖管理
      shopMenu: { background: "#fefcf8", border: "1px solid #e8dfd0", borderRadius: 8, padding: 8, marginBottom: 8 },
      shopRow: { display: "flex", alignItems: "center", padding: "10px 12px", borderRadius: 6, gap: 8 },
      shopRowActive: { background: "#f5e8d8" },
    };

    // ============ 確認彈窗 ============
    function ConfirmModal({ title, message, onConfirm, onCancel, danger }) {
      return (
        <div style={S.modalBack} onClick={onCancel}>
          <div style={S.modal} onClick={(e) => e.stopPropagation()}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              {danger && <div style={{ color: "#8b5a5a" }}>{I.alert}</div>}
              <div style={S.modalTitle}>{title}</div>
            </div>
            <div style={{ fontSize: 14, color: "#5a4a3a", lineHeight: 1.6 }}>{message}</div>
            <div style={S.modalActions}>
              <button onClick={onCancel} style={S.btnSecondary}>取消</button>
              <button onClick={onConfirm} style={danger ? S.btnDanger : S.btnPrimary}>確定</button>
            </div>
          </div>
        </div>
      );
    }

    function PromptModal({ title, defaultValue, placeholder, onConfirm, onCancel }) {
      const [value, setValue] = useState(defaultValue || "");
      return (
        <div style={S.modalBack} onClick={onCancel}>
          <div style={S.modal} onClick={(e) => e.stopPropagation()}>
            <div style={S.modalTitle}>{title}</div>
            <input autoFocus value={value} onChange={(e) => setValue(e.target.value)}
              placeholder={placeholder} style={{...S.input, width: "100%", marginTop: 4}} />
            <div style={S.modalActions}>
              <button onClick={onCancel} style={S.btnSecondary}>取消</button>
              <button onClick={() => value.trim() && onConfirm(value.trim())} style={S.btnPrimary}>確定</button>
            </div>
          </div>
        </div>
      );
    }

    // ============ 登入頁 ============
    function AuthPage() {
      const [mode, setMode] = useState("login"); // login | signup
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [submitting, setSubmitting] = useState(false);

      const handleSubmit = async () => {
        if (!email || !password) return;
        setSubmitting(true);
        setError("");
        try {
          if (mode === "login") {
            await fb.signInWithEmailAndPassword(fb.auth, email, password);
          } else {
            if (password.length < 6) {
              setError("密碼至少需 6 個字元");
              setSubmitting(false);
              return;
            }
            await fb.createUserWithEmailAndPassword(fb.auth, email, password);
          }
        } catch (err) {
          const msg = err.code === "auth/invalid-credential" ? "帳號或密碼錯誤"
            : err.code === "auth/email-already-in-use" ? "此 Email 已註冊"
            : err.code === "auth/invalid-email" ? "Email 格式錯誤"
            : err.code === "auth/weak-password" ? "密碼過短"
            : err.code === "auth/configuration-not-found" ? "Firebase 尚未設定 Authentication"
            : "登入失敗：" + (err.message || err.code);
          setError(msg);
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div style={S.authPage}>
          <div style={S.authBox}>
            <div style={S.authTitle}>店舖記帳</div>
            <div style={S.authSubtitle}>{mode === "login" ? "登入帳號" : "建立新帳號"}</div>

            {error && <div style={S.authError}>{error}</div>}

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)}
                placeholder="Email" style={S.input} autoComplete="email" />
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                placeholder="密碼（至少 6 字）" style={S.input}
                autoComplete={mode === "login" ? "current-password" : "new-password"} />
              <button onClick={handleSubmit} disabled={submitting || !email || !password}
                style={{...S.submitBtn, background: "#3a2e22", marginTop: 6, opacity: (submitting || !email || !password) ? 0.5 : 1}}>
                {submitting ? "處理中…" : mode === "login" ? "登入" : "註冊"}
              </button>
            </div>

            <div style={S.authToggle}>
              {mode === "login" ? "還沒有帳號?" : "已有帳號?"}
              <button onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); }}
                style={S.authToggleLink}>
                {mode === "login" ? "註冊" : "登入"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============ 主元件 ============
    function App() {
      const [user, setUser] = useState(null);
      const [authChecked, setAuthChecked] = useState(false);

      useEffect(() => {
        const unsub = fb.onAuthStateChanged(fb.auth, (u) => {
          setUser(u);
          setAuthChecked(true);
        });
        return () => unsub();
      }, []);

      if (!authChecked) {
        return (
          <div style={S.loading}>
            <div style={S.spinner} />
            <p style={{ marginTop: 16, color: "#8b7a6a" }}>載入中…</p>
          </div>
        );
      }

      if (!user) return <AuthPage />;
      return <MainApp user={user} />;
    }

    function MainApp({ user }) {
      const { shops, loading: shopsLoading } = useShops(user.uid);
      const [activeShopId, setActiveShopId] = useState(null);
      const [tab, setTab] = useState("input");
      const [showShopMenu, setShowShopMenu] = useState(false);
      const [confirmAction, setConfirmAction] = useState(null);
      const [promptAction, setPromptAction] = useState(null);

      // 自動選擇第一間店；若沒有店就提示建立
      useEffect(() => {
        if (!shopsLoading && shops.length > 0 && !activeShopId) {
          setActiveShopId(shops[0].id);
        }
        if (!shopsLoading && shops.length === 0) {
          setActiveShopId(null);
        }
      }, [shops, shopsLoading, activeShopId]);

      // 確保 activeShopId 仍有效
      useEffect(() => {
        if (activeShopId && shops.length > 0 && !shops.find(s => s.id === activeShopId)) {
          setActiveShopId(shops[0].id);
        }
      }, [shops, activeShopId]);

      const activeShop = shops.find((s) => s.id === activeShopId);

      const handleCreateShop = () => {
        setPromptAction({
          title: "建立新店舖",
          placeholder: "店舖名稱",
          onConfirm: async (name) => {
            const ref = await createShop(user.uid, name);
            setActiveShopId(ref.id);
            setPromptAction(null);
            setShowShopMenu(false);
          },
        });
      };

      const handleRenameShop = (shop) => {
        setPromptAction({
          title: "重新命名店舖",
          defaultValue: shop.name,
          placeholder: "店舖名稱",
          onConfirm: async (name) => {
            await renameShop(user.uid, shop.id, name);
            setPromptAction(null);
          },
        });
      };

      const handleDeleteShop = (shop) => {
        setConfirmAction({
          title: "刪除店舖",
          message: `確定要刪除「${shop.name}」嗎？這個店舖的所有記帳資料也會一併刪除，無法復原。`,
          danger: true,
          onConfirm: async () => {
            await deleteShop(user.uid, shop.id);
            setConfirmAction(null);
          },
        });
      };

      const handleLogout = () => {
        setConfirmAction({
          title: "登出",
          message: "確定要登出嗎？",
          onConfirm: async () => {
            await fb.signOut(fb.auth);
            setConfirmAction(null);
          },
        });
      };

      if (shopsLoading) {
        return (
          <div style={S.loading}>
            <div style={S.spinner} />
            <p style={{ marginTop: 16, color: "#8b7a6a" }}>載入中…</p>
          </div>
        );
      }

      // 沒有任何店舖：強制顯示建立店舖畫面
      if (shops.length === 0) {
        return (
          <div style={S.app}>
            <header style={S.header}>
              <div style={S.brand}>
                <span style={{color: "#3a2e22"}}>{I.store}</span>
                <span style={S.brandText}>店舖記帳</span>
              </div>
              <button onClick={handleLogout} style={{...S.iconBtn, padding: 6}}>{I.logout}</button>
            </header>
            <main style={{...S.main, paddingTop: 40}}>
              <div style={{textAlign: "center", marginBottom: 24}}>
                <div style={{fontSize: 16, fontWeight: 600, fontFamily: "var(--font-display)", marginBottom: 6}}>歡迎使用</div>
                <div style={{fontSize: 13, color: "#8b7a6a"}}>請先建立你的第一間店舖</div>
              </div>
              <button onClick={handleCreateShop} style={{...S.submitBtn, background: "#3a2e22"}}>
                + 建立店舖
              </button>
            </main>
            {promptAction && <PromptModal {...promptAction} onCancel={() => setPromptAction(null)} />}
          </div>
        );
      }

      return (
        <div style={S.app}>
          <header style={S.header}>
            <div style={S.brand}>
              <span style={{color: "#3a2e22"}}>{I.store}</span>
              <span style={S.brandText}>店舖記帳</span>
            </div>
            <div style={{display: "flex", alignItems: "center", gap: 6}}>
              <button onClick={() => setShowShopMenu(true)} style={S.shopBtn}>
                <span style={{
                  whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
                  maxWidth: 100, fontWeight: 600,
                }}>
                  {activeShop?.name || "選店舖"}
                </span>
                <span style={{color: "#8b7a6a"}}>{I.chevDown}</span>
              </button>
            </div>
          </header>

          <main style={S.main}>
            {tab === "input" && activeShopId && (
              <InputTab user={user} shopId={activeShopId}
                onConfirmAction={setConfirmAction} />
            )}
            {tab === "report" && activeShopId && (
              <ReportTab user={user} shopId={activeShopId} shopName={activeShop?.name} />
            )}
            {tab === "trend" && activeShopId && (
              <TrendTab user={user} shopId={activeShopId} shop={activeShop} />
            )}
            {tab === "history" && activeShopId && (
              <HistoryTab user={user} shopId={activeShopId} />
            )}
          </main>

          <nav style={S.tabbar}>
            <TabBtn active={tab === "input"} onClick={() => setTab("input")} icon={I.plus} label="記帳" />
            <TabBtn active={tab === "report"} onClick={() => setTab("report")} icon={I.trending} label="損益表" />
            <TabBtn active={tab === "trend"} onClick={() => setTab("trend")} icon={I.activity} label="走勢" />
            <TabBtn active={tab === "history"} onClick={() => setTab("history")} icon={I.history} label="歷史" />
          </nav>

          {/* 店舖選單彈窗 */}
          {showShopMenu && (
            <div style={S.modalBack} onClick={() => setShowShopMenu(false)}>
              <div style={{...S.modal, maxWidth: 380}} onClick={(e) => e.stopPropagation()}>
                <div style={{display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12}}>
                  <div style={S.modalTitle}>店舖管理</div>
                  <button onClick={() => setShowShopMenu(false)} style={{color: "#8b7a6a"}}>{I.x}</button>
                </div>
                <div style={{display: "flex", flexDirection: "column", gap: 4}}>
                  {shops.map((shop) => (
                    <div key={shop.id}
                      style={{
                        ...S.shopRow,
                        ...(shop.id === activeShopId ? S.shopRowActive : {}),
                      }}>
                      <button onClick={() => { setActiveShopId(shop.id); setShowShopMenu(false); }}
                        style={{flex: 1, textAlign: "left", fontSize: 14, fontWeight: shop.id === activeShopId ? 600 : 400}}>
                        {shop.name}
                        {shop.id === activeShopId && <span style={{marginLeft: 8, color: "#5a8b6b"}}>✓</span>}
                      </button>
                      <button onClick={() => handleRenameShop(shop)} style={S.iconBtn}>{I.edit}</button>
                      {shops.length > 1 && (
                        <button onClick={() => handleDeleteShop(shop)} style={{...S.iconBtn, color: "#8b5a5a"}}>{I.trash}</button>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{display: "flex", flexDirection: "column", gap: 8, marginTop: 12, paddingTop: 12, borderTop: "1px solid #e8dfd0"}}>
                  <button onClick={handleCreateShop}
                    style={{...S.btnSecondary, padding: "10px"}}>+ 新增店舖</button>
                  <button onClick={handleLogout}
                    style={{...S.btnSecondary, padding: "10px", color: "#8b5a5a", borderColor: "#d4a8a8"}}>
                    登出 ({user.email})
                  </button>
                </div>
              </div>
            </div>
          )}

          {confirmAction && (
            <ConfirmModal {...confirmAction} onCancel={() => setConfirmAction(null)} />
          )}
          {promptAction && (
            <PromptModal {...promptAction} onCancel={() => setPromptAction(null)} />
          )}
        </div>
      );
    }

    function TabBtn({ active, onClick, icon, label }) {
      return (
        <button onClick={onClick} style={{...S.tabBtn, ...(active ? S.tabBtnActive : {})}}>
          <div style={{ opacity: active ? 1 : 0.5 }}>{icon}</div>
          <span style={{ fontSize: 11, marginTop: 2, opacity: active ? 1 : 0.6 }}>{label}</span>
        </button>
      );
    }

    // ============ 記帳輸入分頁 ============
    function InputTab({ user, shopId, onConfirmAction }) {
      const { entries } = useEntries(user.uid, shopId);
      const [date, setDate] = useState(todayStr());
      const [type, setType] = useState("expense");
      const [category, setCategory] = useState("material");
      const [incomeCat, setIncomeCat] = useState("pos");
      const [amount, setAmount] = useState("");
      const [note, setNote] = useState("");
      const [editingId, setEditingId] = useState(null);
      const [showSuccess, setShowSuccess] = useState(false);

      const todayEntries = useMemo(
        () => entries.filter((e) => e.date === date),
        [entries, date]
      );

      const dayTotal = useMemo(() => {
        let income = 0, expense = 0;
        todayEntries.forEach((e) => {
          if (e.type === "income") income += e.amount;
          else expense += e.amount;
        });
        return { income, expense };
      }, [todayEntries]);

      // 本月概況（用於頂部即時顯示）
      const monthSummary = useMemo(() => {
        const thisMonth = ymOf(todayStr());
        return calcMonth(entries, thisMonth);
      }, [entries]);

      const handleSubmit = async () => {
        const amt = parseFloat(amount);
        if (!amt || amt <= 0) return;

        const data = {
          date, type,
          category: type === "income" ? incomeCat : category,
          amount: amt,
          note: note.trim(),
        };

        try {
          if (editingId) {
            await updateEntryFn(user.uid, shopId, editingId, data);
            setEditingId(null);
          } else {
            await addEntry(user.uid, shopId, data);
          }
          setAmount("");
          setNote("");
          setShowSuccess(true);
          setTimeout(() => setShowSuccess(false), 1200);
        } catch (err) {
          alert("儲存失敗：" + err.message);
        }
      };

      const startEdit = (entry) => {
        setEditingId(entry.id);
        setDate(entry.date);
        setType(entry.type);
        if (entry.type === "income") setIncomeCat(entry.category);
        else setCategory(entry.category);
        setAmount(String(entry.amount));
        setNote(entry.note || "");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const cancelEdit = () => {
        setEditingId(null);
        setAmount("");
        setNote("");
      };

      const handleDelete = (entry) => {
        const cat = entry.type === "income"
          ? INCOME_CATEGORIES.find((c) => c.id === entry.category)
          : EXPENSE_CATEGORIES.find((c) => c.id === entry.category);
        onConfirmAction({
          title: "刪除這筆紀錄?",
          message: `${entry.date} · ${cat?.label || entry.category} · ${entry.type === "income" ? "+" : "-"}${fmt(entry.amount)}${entry.note ? `\n備註：${entry.note}` : ""}`,
          danger: true,
          onConfirm: async () => {
            await removeEntry(user.uid, shopId, entry.id);
            onConfirmAction(null);
          },
        });
      };

      return (
        <div style={S.tabContent}>
          {/* 本月即時概況 */}
          <div style={S.monthGlance}>
            <div style={S.glanceHead}>
              <span style={{fontSize: 11, color: "#8b7a6a", letterSpacing: 2}}>本月即時概況</span>
              <span style={{fontSize: 11, color: "#8b7a6a"}}>
                {yearROC(ymOf(todayStr()))}年 {monthOf(ymOf(todayStr()))}月
              </span>
            </div>
            <div style={S.glanceGrid}>
              <div style={S.glanceCell}>
                <div style={S.glanceLabel}>已賺</div>
                <div style={{...S.glanceValue, color: "#5a8b6b"}}>{fmt(monthSummary.income.total)}</div>
              </div>
              <div style={S.glanceCell}>
                <div style={S.glanceLabel}>已花</div>
                <div style={{...S.glanceValue, color: "#8b5a5a"}}>{fmt(monthSummary.totalExpense)}</div>
              </div>
              <div style={S.glanceCell}>
                <div style={S.glanceLabel}>淨利</div>
                <div style={{
                  ...S.glanceValue,
                  color: monthSummary.netProfit >= 0 ? "#3a5a44" : "#5a3a3a",
                }}>
                  {monthSummary.netProfit >= 0 ? "+" : ""}{fmt(monthSummary.netProfit)}
                </div>
              </div>
            </div>
          </div>

          {editingId && (
            <div style={S.editingBanner}>
              <span>{I.edit}</span> 編輯模式
              <button onClick={cancelEdit} style={S.editingCancel}>取消</button>
            </div>
          )}

          <div style={S.section}>
            <label style={S.label}>

    function ReportTab({ user, shopId, shopName }) {
      const { entries } = useEntries(user.uid, shopId);
      const [selectedMonth, setSelectedMonth] = useState(ymOf(todayStr()));
      const [detailCat, setDetailCat] = useState(null); // 點開的分類: { id, label, type }
      const report = useMemo(() => calcMonth(entries, selectedMonth), [entries, selectedMonth]);

      // 取得當月某分類的所有紀錄（用於明細彈窗）
      const detailEntries = useMemo(() => {
        if (!detailCat) return [];
        return entries
          .filter((e) => {
            if (ymOf(e.date) !== selectedMonth) return false;
            if (e.type !== detailCat.type) return false;
            // 營業收入特殊處理：不分 POS/Uber 一起顯示
            if (detailCat.id === "_income") return true;
            return e.category === detailCat.id;
          })
          .sort((a, b) => a.date.localeCompare(b.date));
      }, [entries, selectedMonth, detailCat]);

      const changeMonth = (delta) => {
        const [y, m] = selectedMonth.split("-").map(Number);
        const d = new Date(y, m - 1 + delta, 1);
        setSelectedMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
      };

      const exportCSV = () => {
        const rows = [
          ["項目", "細項", "金額", "佔比"],
          ["營業收入", "POS營收+Uber營收", report.income.total, "100.00%"],
          ...EXPENSE_CATEGORIES.map((c) => [
            c.label, c.hint, report.expense[c.id],
            report.income.total > 0 ? fmtPct(report.expense[c.id] / report.income.total) : "0%"
          ]),
          ["淨利", "營業額 - 成本及費用", report.netProfit,
            report.income.total > 0 ? fmtPct(report.netProfit / report.income.total) : "0%"],
        ];
        const csv = "\uFEFF" + rows.map((r) => r.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${shopName || "店舖"}_損益表_${selectedMonth}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const totalIncome = report.income.total;
      const profitable = report.netProfit >= 0;

      return (

          <div style={S.monthNav}>

            ...S.profitCard,

            <div style={{ fontSize: 11, letterSpacing: 3, color: "#5a4a3a", opacity: 0.7 }}>淨利</div>

            <div style={S.reportHead}>

              <div style={{ flex: 2, fontSize: 12, color: "#8b7a6a", minWidth: 0 }}>POS+Uber</div>
              <div style={{ flex: 2, textAlign: "right", fontWeight: 600, paddingRight: 8, minWidth: 0 }}>{fmt(totalIncome)}</div>

              <div style={{ flex: 2, fontSize: 11, color: "#5a4a3a", minWidth: 0 }}>營業額 - 成本費用</div>
              <div style={{
                flex: 2, textAlign: "right", paddingRight: 8, minWidth: 0,
                color: profitable ? "#3a5a44" : "#5a3a3a",
              }}>
                {profitable ? "+" : ""}{fmt(report.netProfit)}
              </div>
              <div style={{
                flex: 1.2, textAlign: "right", fontSize: 12, minWidth: 0,
                color: profitable ? "#3a5a44" : "#5a3a3a",

    // ============ 走勢圖分頁 ============
    function TrendTab({ user, shopId, shop }) {
      const { entries } = useEntries(user.uid, shopId);
      const [range, setRange] = useState(12);
      const [editingGoal, setEditingGoal] = useState(false);
      const [goalInput, setGoalInput] = useState("");

      const monthlyGoal = shop?.monthlyGoal || 0;

      const saveGoal = async () => {
        const v = parseFloat(goalInput);
        if (isNaN(v) || v < 0) {
          setEditingGoal(false);
          return;
        }
        await updateMonthlyGoal(user.uid, shopId, v);
        setEditingGoal(false);
      };

      const data = useMemo(() => {
        const monthSet = new Set(entries.map((e) => ymOf(e.date)));
        if (monthSet.size === 0) return [];

        const today = new Date();
        const months = [];

        if (range === 999) {
          const sorted = [...monthSet].sort();
          const earliest = sorted[0];
          const [ey, em] = earliest.split("-").map(Number);
          const start = new Date(ey, em - 1, 1);
          const end = new Date(today.getFullYear(), today.getMonth(), 1);
          const cur = new Date(start);
          while (cur <= end) {
            months.push(`${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, "0")}`);
            cur.setMonth(cur.getMonth() + 1);
          }
        } else {
          for (let i = range - 1; i >= 0; i--) {
            const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
            months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
          }
        }

        return months.map((ym) => {
          const r = calcMonth(entries, ym);
          return {
            ym,
            label: `${monthOf(ym)}月`,
            fullLabel: `${yearROC(ym)}/${monthOf(ym)}`,
            revenue: r.income.total,
            profit: r.netProfit,
            expense: r.totalExpense,
          };
        });
      }, [entries, range]);

      const stats = useMemo(() => {
        const withData = data.filter((d) => d.revenue > 0);
        if (withData.length === 0) return null;
        const latest = withData[withData.length - 1];
        const prev = withData.length >= 2 ? withData[withData.length - 2] : null;
        const revChange = prev && prev.revenue > 0 ? (latest.revenue - prev.revenue) / prev.revenue : null;
        const profitChange = prev ? latest.profit - prev.profit : null;
        const maxRev = withData.reduce((a, b) => (b.revenue > a.revenue ? b : a));
        const minRev = withData.reduce((a, b) => (b.revenue < a.revenue ? b : a));
        const avgRev = withData.reduce((s, d) => s + d.revenue, 0) / withData.length;
        const avgProfit = withData.reduce((s, d) => s + d.profit, 0) / withData.length;
        return { latest, prev, revChange, profitChange, maxRev, minRev, avgRev, avgProfit, count: withData.length };
      }, [data]);

      const hasData = stats && stats.count > 0;

      return (
        <div style={S.tabContent}>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 4 }}>
            <div>
              <div style={{ fontSize: 11, color: "#8b7a6a", letterSpacing: 2 }}>MONTHLY TREND</div>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "var(--font-display)" }}>營收走勢</div>
            </div>
            <button onClick={() => { setGoalInput(monthlyGoal ? String(monthlyGoal) : ""); setEditingGoal(true); }}
              style={S.goalBtn}>
              {monthlyGoal > 0 ? `目標 ${fmt(monthlyGoal)}` : "+ 設定目標"}
            </button>
          </div>

          {/* 目標達成提示 */}
          {monthlyGoal > 0 && hasData && (() => {
            const thisMonthData = data.find((d) => d.ym === ymOf(todayStr()));
            if (!thisMonthData) return null;
            const pct = (thisMonthData.revenue / monthlyGoal) * 100;
            const reached = thisMonthData.revenue >= monthlyGoal;
            return (
              <div style={{
                ...S.goalProgress,
                background: reached
                  ? "linear-gradient(135deg, #d4e8d8 0%, #b8d4be 100%)"
                  : "linear-gradient(135deg, #fdf8f0 0%, #f5ebd8 100%)",
              }}>
                <div style={{display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6}}>
                  <span style={{fontSize: 11, color: "#5a4a3a", letterSpacing: 1}}>本月目標達成</span>
                  <span style={{fontSize: 13, fontWeight: 700, fontFamily: "var(--font-display)",
                    color: reached ? "#3a5a44" : "#8b6f4e"}}>
                    {pct.toFixed(1)}%
                  </span>
                </div>
                <div style={{height: 6, background: "#e8dfd0", borderRadius: 3, overflow: "hidden"}}>
                  <div style={{
                    width: `${Math.min(pct, 100)}%`, height: "100%",
                    background: reached ? "#5a8b6b" : "#c4956c",
                    transition: "width 0.4s",
                  }} />
                </div>
                <div style={{fontSize: 11, color: "#8b7a6a", marginTop: 4}}>
                  {reached
                    ? `🎉 已達標,超出 ${fmt(thisMonthData.revenue - monthlyGoal)}`
                    : `還差 ${fmt(monthlyGoal - thisMonthData.revenue)}`}
                </div>
              </div>
            );
          })()}

          <div style={S.rangeRow}>
            {[
              { v: 6, l: "近6月" },
              { v: 12, l: "近12月" },
              { v: 999, l: "全部" },
            ].map((r) => (
              <button key={r.v} onClick={() => setRange(r.v)}
                style={{...S.rangeBtn, ...(range === r.v ? S.rangeBtnActive : {})}}>
                {r.l}
              </button>
            ))}
          </div>

          {hasData ? (
            <div style={S.statsGrid}>
              <div style={S.statCard}>
                <div style={S.statLabel}>本月營收</div>
                <div style={{...S.statValue, color: "#3a5a44"}}>{fmt(stats.latest.revenue)}</div>
                {stats.revChange !== null && (
                  <div style={{...S.statChange, color: stats.revChange >= 0 ? "#5a8b6b" : "#8b5a5a"}}>
                    {stats.revChange >= 0 ? "▲" : "▼"} {fmtPct(Math.abs(stats.revChange))}
                    <span style={{ fontSize: 10, color: "#8b7a6a", marginLeft: 4 }}>vs 上月</span>
                  </div>
                )}
              </div>
              <div style={S.statCard}>
                <div style={S.statLabel}>本月淨利</div>
                <div style={{...S.statValue, color: stats.latest.profit >= 0 ? "#3a5a44" : "#5a3a3a"}}>
                  {stats.latest.profit >= 0 ? "+" : ""}{fmt(stats.latest.profit)}
                </div>
                {stats.profitChange !== null && (
                  <div style={{...S.statChange, color: stats.profitChange >= 0 ? "#5a8b6b" : "#8b5a5a"}}>
                    {stats.profitChange >= 0 ? "▲" : "▼"} {fmt(Math.abs(stats.profitChange))}
                    <span style={{ fontSize: 10, color: "#8b7a6a", marginLeft: 4 }}>vs 上月</span>
                  </div>
                )}
              </div>
            </div>
          ) : (
            <div style={S.emptyHint}>
              還沒有資料，到「記帳」分頁輸入收支後即可看到走勢
            </div>
          )}

          {data.length > 0 && (
            <div style={S.chartCard}>
              <div style={{ fontSize: 11, color: "#8b7a6a", letterSpacing: 2, marginBottom: 8 }}>
                營收 × 淨利 走勢
              </div>
              <ResponsiveContainer width="100%" height={260}>
                <LineChart data={data} margin={{ top: 10, right: 10, left: -10, bottom: 0 }}>
                  <CartesianGrid strokeDasharray="2 4" stroke="#e8dfd0" vertical={false} />
                  <XAxis dataKey="label" tick={{ fontSize: 11, fill: "#8b7a6a" }}
                    axisLine={{ stroke: "#d4c4b0" }} tickLine={false} />
                  <YAxis tick={{ fontSize: 10, fill: "#8b7a6a" }} axisLine={false} tickLine={false}
                    tickFormatter={(v) => v >= 10000 ? `${(v / 10000).toFixed(0)}萬` : v} />
                  <Tooltip
                    contentStyle={{ background: "#fdf8f0", border: "1px solid #d4c4b0", borderRadius: 6, fontSize: 12 }}
                    labelFormatter={(label, payload) => {
                      if (payload && payload[0]) return payload[0].payload.fullLabel;
                      return label;
                    }}
                    formatter={(value, name) => [fmt(value), name]} />
                  <Legend wrapperStyle={{ fontSize: 12, paddingTop: 8 }} iconType="line" />
                  <ReferenceLine y={0} stroke="#a89880" strokeDasharray="3 3" />
                  {monthlyGoal > 0 && (
                    <ReferenceLine y={monthlyGoal} stroke="#c4956c" strokeDasharray="6 4" strokeWidth={1.5}
                      label={{ value: `目標 ${fmt(monthlyGoal)}`, position: "insideTopRight", fill: "#a8826a", fontSize: 10 }} />
                  )}
                  <Line type="monotone" dataKey="revenue" name="營收" stroke="#a8826a"
                    strokeWidth={2.5} dot={{ fill: "#a8826a", r: 3 }} activeDot={{ r: 5 }} />
                  <Line type="monotone" dataKey="profit" name="淨利" stroke="#5a8b6b"
                    strokeWidth={2.5} dot={{ fill: "#5a8b6b", r: 3 }} activeDot={{ r: 5 }} />
                </LineChart>
              </ResponsiveContainer>
            </div>
          )}

          {hasData && stats.count >= 2 && (
            <div style={S.subBox}>
              <div style={S.subBoxTitle}>區間統計</div>
              <div style={S.subRow}>
                <span style={{ color: "#8b7a6a" }}>平均月營收</span>
                <span style={{ fontWeight: 600 }}>{fmt(stats.avgRev)}</span>
              </div>
              <div style={S.subRow}>
                <span style={{ color: "#8b7a6a" }}>平均月淨利</span>
                <span style={{ fontWeight: 600, color: stats.avgProfit >= 0 ? "#5a8b6b" : "#8b5a5a" }}>
                  {stats.avgProfit >= 0 ? "+" : ""}{fmt(stats.avgProfit)}
                </span>
              </div>
              <div style={S.subRow}>
                <span style={{ color: "#8b7a6a" }}>最高營收月</span>
                <span style={{ fontWeight: 600 }}>{stats.maxRev.fullLabel} · {fmt(stats.maxRev.revenue)}</span>
              </div>
              <div style={S.subRow}>
                <span style={{ color: "#8b7a6a" }}>最低營收月</span>
                <span style={{ fontWeight: 600 }}>{stats.minRev.fullLabel} · {fmt(stats.minRev.revenue)}</span>
              </div>
            </div>
          )}

          {/* 目標營收編輯彈窗 */}
          {editingGoal && (
            <div style={S.modalBack} onClick={() => setEditingGoal(false)}>
              <div style={S.modal} onClick={(e) => e.stopPropagation()}>
                <div style={S.modalTitle}>設定每月目標營收</div>
                <div style={{fontSize: 12, color: "#8b7a6a", marginBottom: 12, lineHeight: 1.5}}>
                  設定後,走勢圖會畫一條虛線,本月達成率也會即時顯示。
                  輸入 0 可取消目標。
                </div>
                <div style={S.amountWrap}>
                  <span style={S.currency}>NT$</span>
                  <input type="number" inputMode="decimal" autoFocus
                    value={goalInput} onChange={(e) => setGoalInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && saveGoal()}
                    placeholder="例如 600000" style={S.amountInput} />
                </div>
                <div style={S.modalActions}>
                  <button onClick={() => setEditingGoal(false)} style={S.btnSecondary}>取消</button>
                  <button onClick={saveGoal} style={S.btnPrimary}>儲存</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ============ 歷史比較分頁 ============
    function HistoryTab({ user, shopId }) {
      const { entries } = useEntries(user.uid, shopId);

      const monthlyData = useMemo(() => {
        const set = new Set(entries.map((e) => ymOf(e.date)));
        const months = [...set].sort().reverse();
        return months.map((ym) => calcMonth(entries, ym));
      }, [entries]);

      if (monthlyData.length === 0) {
        return (
          <div style={S.tabContent}>
            <div style={S.emptyHint}>還沒有任何記錄</div>
          </div>
        );
      }

      return (
        <div style={S.tabContent}>
          <div style={{ marginBottom: 4 }}>
            <div style={{ fontSize: 11, color: "#8b7a6a", letterSpacing: 2 }}>HISTORY</div>
            <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "var(--font-display)" }}>歷史月份</div>
            <div style={{ fontSize: 12, color: "#8b7a6a", marginTop: 4 }}>
              共 {monthlyData.length} 個月的紀錄
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 8 }}>
            {monthlyData.map((m, idx) => {
              const prev = monthlyData[idx + 1];
              const revChange = prev && prev.income.total > 0
                ? (m.income.total - prev.income.total) / prev.income.total
                : null;

              return (
                <div key={m.ym} style={S.historyCard}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: 11, color: "#8b7a6a", letterSpacing: 1 }}>
                        {yearROC(m.ym)} 年
                      </div>
                      <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "var(--font-display)" }}>
                        {monthOf(m.ym)} 月
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 10, color: "#8b7a6a", letterSpacing: 1 }}>淨利</div>
                      <div style={{
                        fontSize: 20, fontWeight: 700, fontFamily: "var(--font-display)",
                        color: m.netProfit >= 0 ? "#3a5a44" : "#5a3a3a",
                      }}>
                        {m.netProfit >= 0 ? "+" : ""}{fmt(m.netProfit)}
                      </div>
                    </div>
                  </div>

                  <div style={S.historyStats}>
                    <div>
                      <div style={S.histLabel}>營收</div>
                      <div style={S.histValue}>{fmt(m.income.total)}</div>
                      {revChange !== null && (
                        <div style={{
                          fontSize: 10,
                          color: revChange >= 0 ? "#5a8b6b" : "#8b5a5a",
                          marginTop: 2,
                        }}>
                          {revChange >= 0 ? "▲" : "▼"} {fmtPct(Math.abs(revChange))}
                        </div>
                      )}
                    </div>
                    <div>
                      <div style={S.histLabel}>支出</div>
                      <div style={S.histValue}>{fmt(m.totalExpense)}</div>
                    </div>
                    <div>
                      <div style={S.histLabel}>毛利率</div>
                      <div style={S.histValue}>
                        {m.income.total > 0 ? fmtPct(m.netProfit / m.income.total) : "—"}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ============ 渲染 ============
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
